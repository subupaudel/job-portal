# Use dynamic port for Render
server.port=${PORT:8080}

spring.application.name=jobportal

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/job_portal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_NAME:dyucgevvq}
cloudinary.api_key=${CLOUDINARY_KEY:983964335226331}
cloudinary.api_secret=${CLOUDINARY_SECRET:your_secret}

# JWT
jwt.secret=${JWT_SECRET:MySuperStrongJwtSecretKeyThatIsLongEnoughForHS256123456}
jwt.expiration=86400000

# Stripe
stripe.secretKey=${STRIPE_SECRET:sk_test_XXXXXXXXXXXXXXXXXXXX}
stripe.publishableKey=${STRIPE_PUBLIC:pk_test_XXXXXXXXXXXXXXXXXXXX}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:your-email@gmail.com}
spring.mail.password=${MAIL_PASS:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true